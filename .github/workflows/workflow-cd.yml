name: Update Tag for GitOps

on:
  push:
    tags:
      - '*.*.*'

jobs:
  check-latest-tag:
    name: Check Latest Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current tag
        id: current
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Fetch all tags
        run: git fetch --tags

      - name: Get latest semantic tag
        id: latest
        run: |
          latest=$(git tag -l '*.*.*' --sort=-v:refname | head -n 1)
          echo "latest=$latest" >> $GITHUB_OUTPUT

      - name: Compare tags
        run: |
          echo "Current tag: ${{ steps.current.outputs.tag }}"
          echo "Latest tag:  ${{ steps.latest.outputs.latest }}"

          if [ "${{ steps.current.outputs.tag }}" != "${{ steps.latest.outputs.latest }}" ]; then
            echo "Not the latest tag"
            exit 1
          fi

      - name: Echo tag
        run: echo "Deploying version ${{ steps.current.outputs.tag }}"