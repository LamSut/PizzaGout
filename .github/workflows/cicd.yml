name: Build, Scan, Push and Tag

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

  pull_request_target:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Services with Version
    uses: LamSut/cicd/.github/workflows/version-prepare.yml@main
    with:
      services: ${{ vars.SERVICES }}
      event_name: ${{ github.event_name }}
      ref_name: ${{ github.ref_name }}
      pr_title: ${{ github.event.pull_request.title || '' }}

  scan-code-quality:
    name: Scan Code Quality
    if: github.event_name == 'pull_request'
    uses: LamSut/cicd/.github/workflows/sonarcloud.yml@main
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-docker-images:
    name: Build Docker Image
    if: github.event_name == 'pull_request' && needs.prepare.result == 'success'
    needs:
      - prepare
    strategy:
      matrix:
        service: ${{ fromJSON(needs.prepare.outputs.services) }}
    uses: LamSut/cicd/.github/workflows/docker-build.yml@main
    with:
      service: ${{ matrix.service }}
      version: ${{ needs.prepare.outputs.version }}
      build_args: ${{ matrix.service == 'pizza-fe' && vars.VITE_TARGET != '' && format('VITE_TARGET={0}', vars.VITE_TARGET) || '' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

  scan-image-vulnerabilities:
    name: Scan Image Vulnerabilities
    if: github.event_name == 'pull_request' && needs.prepare.result == 'success' && needs.build-docker-images.result == 'success'
    needs:
      - prepare
      - build-docker-images
    strategy:
      matrix:
        service: ${{ fromJSON(needs.prepare.outputs.services) }}
    uses: LamSut/cicd/.github/workflows/trivy.yml@main
    with:
      service: ${{ matrix.service }}
      version: ${{ needs.prepare.outputs.version }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

  push-docker-images:
    name: Push Docker Images
    if: github.event_name == 'pull_request' && needs.prepare.result == 'success' && needs.build-docker-images.result == 'success' && needs.scan-image-vulnerabilities.result == 'success'
    needs:
      - prepare
      - build-docker-images
      - scan-image-vulnerabilities
    strategy:
      matrix:
        service: ${{ fromJSON(needs.prepare.outputs.services) }}
    uses: LamSut/cicd/.github/workflows/docker-push.yml@main
    with:
      service: ${{ matrix.service }}
      version: ${{ needs.prepare.outputs.version }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  tag-version:
    name: Tag Version
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && needs.prepare.result == 'success'
    needs:
      - prepare
    uses: LamSut/cicd/.github/workflows/version-tag.yml@main
    with:
      version: ${{ needs.prepare.outputs.version }}

  update-gitops-tag:
    name: Update GitOps Tag
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && needs.prepare.result == 'success'
    needs:
      - prepare
      - tag-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: LamSut/gitops-local
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update pizza-be and pizza-fe tags
        working-directory: gitops
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          version = "${{ needs.prepare.outputs.version }}"
          files = [
              Path("environments/dev/pizza-be-values.yaml"),
              Path("environments/dev/pizza-fe-values.yaml"),
          ]

          for path in files:
              text = path.read_text()
              new_text, count = re.subn(
                  r'(tag:\s*")[^"]*(")',
                  rf'\g<1>{version}\2',
                  text,
                  count=1
              )
              if count != 1:
                  raise SystemExit(f"No config file")
              path.write_text(new_text)
          PY

      - name: Commit and push
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add environments/dev/pizza-be-values.yaml environments/dev/pizza-fe-values.yaml

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update pizza tags to ${{ needs.prepare.outputs.version }}"
          git push