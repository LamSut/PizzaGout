name: Build, Scan and Push

on:
  push:
    tags:
      - "*.*.*"

jobs:
  prepare:
    name: Prepare Services with Version
    uses: LamSut/CICD/.github/workflows/ci-prepare.yml@1.0.1
    with:
      services: ${{ vars.SERVICES }}

  scan-code-quality:
    name: Scan Code Quality
    needs: prepare
    uses: LamSut/CICD/.github/workflows/sonarcloud.yml@1.0.1
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-docker-images:
    name: Build Docker Image
    needs:
      - prepare
      - scan-code-quality
    strategy:
      matrix:
        service: ${{ fromJSON(needs.prepare.outputs.services) }}
    uses: LamSut/CICD/.github/workflows/docker-build.yml@1.0.1
    with:
      service: ${{ matrix.service }}
      version: ${{ needs.prepare.outputs.version }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

  scan-image-vulnerabilities:
    name: Scan Image Vulnerabilities
    needs:
      - prepare
      - build-docker-images
    strategy:
      matrix:
        service: ${{ fromJSON(needs.prepare.outputs.services) }}
    uses: LamSut/CICD/.github/workflows/trivy.yml@1.0.1
    with:
      service: ${{ matrix.service }}
      version: ${{ needs.prepare.outputs.version }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

  push-docker-images:
    name: Push Docker Images
    needs:
      - prepare
      - scan-image-vulnerabilities
    strategy:
      matrix:
        service: ${{ fromJSON(needs.prepare.outputs.services) }}
    uses: LamSut/CICD/.github/workflows/docker-push.yml@1.0.1
    with:
      service: ${{ matrix.service }}
      version: ${{ needs.prepare.outputs.version }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
