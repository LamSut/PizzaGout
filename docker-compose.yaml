services:
  # Frontend
  frontend:
    image: ${FRONTEND_IMAGE}:${FRONTEND_VERSION}
    build:
      context: ./pizza-fe
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT_EXTERNAL}:5173"
    env_file:
      - ./pizza-fe/.env
    networks:
      - app-network
    command: ["node", "node_modules/vite/bin/vite.js", "--host", "0.0.0.0"]

  # Backend
  backend:
    image: ${BACKEND_IMAGE}:${BACKEND_VERSION}
    build:
      context: ./pizza-be
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT_EXTERNAL}:3000"
    env_file:
      - ./pizza-be/.env
    volumes:
      - ./pizza-be/public:/app/public
    depends_on:
      - mysql
      - redis
    networks:
      - app-network
    command: ["node", "server.js"]

  # Redis
  redis:
    image: redis:${REDIS_VERSION}
    container_name: redis
    restart: always
    ports:
      - "${REDIS_PORT_EXTERNAL}:6379"
    networks:
      - app-network

  # MySQL
  mysql:
    image: mysql:${MYSQL_VERSION}
    container_name: mysql
    command: mysqld --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${MYSQL_PORT_EXTERNAL}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./pizza-be/src/database/pizza.sql:/docker-entrypoint-initdb.d/pizza.sql:ro
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
